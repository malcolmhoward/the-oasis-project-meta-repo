# Mosquitto MQTT Broker Configuration for O.A.S.I.S. Development
# See https://mosquitto.org/man/mosquitto-conf-5.html for full documentation

# Listener for MQTT protocol
listener 1883
protocol mqtt

# Listener for WebSocket connections (useful for web-based debugging)
listener 9001
protocol websockets

# Allow anonymous connections for development
# WARNING: Do not use in production - configure authentication
allow_anonymous true

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections -1
